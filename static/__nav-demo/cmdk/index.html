<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Command palette — demo</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:wght@400;600;700&display=swap">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/themes.css">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--surface-1);
    color: var(--text);
    line-height: var(--lh-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ------------------------------------------------------------------ */
  /* Backdrop page that mimics the real site                              */
  /* ------------------------------------------------------------------ */

  .page-shell {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px 120px;
  }

  .demo-banner {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--warning-subtle);
    color: var(--warning);
    font-size: 10px;
    font-family: var(--font-mono);
    font-weight: 600;
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 100;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: var(--ls-heading);
    line-height: 1.1;
    margin: 0 0 var(--s-3);
  }

  .lede {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 50ch;
    margin: 0 0 var(--s-6);
    line-height: 1.55;
  }

  .open-trigger {
    display: inline-flex;
    align-items: center;
    gap: var(--s-3);
    padding: 10px 14px 10px 16px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    background: var(--surface-0);
    font-family: inherit;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
  }
  .open-trigger:hover { border-color: var(--text-faint); }
  .open-trigger kbd {
    font-family: var(--font-mono);
    font-size: 11px;
    background: var(--surface-2);
    color: var(--text);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-left: 4px;
  }

  /* ------------------------------------------------------------------ */
  /* Palette                                                              */
  /* ------------------------------------------------------------------ */

  .palette-backdrop {
    position: fixed;
    inset: 0;
    background: color-mix(in oklab, var(--text) 45%, transparent);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 12vh var(--s-4) var(--s-4);
    animation: fade-in 160ms ease forwards;
  }
  .palette-backdrop[data-open="true"] { display: flex; }

  @keyframes fade-in   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slide-in  { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .palette {
    width: 100%;
    max-width: 560px;
    background: var(--surface-0);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 24px 60px color-mix(in oklab, var(--text) 30%, transparent);
    overflow: hidden;
    animation: slide-in 200ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .palette-input-row {
    display: flex;
    align-items: center;
    gap: var(--s-3);
    padding: var(--s-3) var(--s-4);
    border-bottom: 1px solid var(--border);
  }

  .palette-input-row .glyph {
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
  }

  .palette-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    padding: 4px 0;
  }

  .palette-input::placeholder { color: var(--text-faint); }

  .esc-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface-2);
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .palette-list {
    list-style: none;
    margin: 0;
    padding: var(--s-2) 0;
    max-height: 50vh;
    overflow-y: auto;
  }

  .palette-group {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .palette-group-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    padding: var(--s-3) var(--s-4) var(--s-1);
  }

  .palette-item {
    display: flex;
    align-items: center;
    gap: var(--s-3);
    padding: 9px var(--s-4);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease);
  }
  .palette-item:hover,
  .palette-item.active {
    background: var(--surface-hover);
  }
  .palette-item.active {
    background: var(--accent-subtle);
  }

  .palette-icon {
    width: 24px;
    height: 24px;
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    flex-shrink: 0;
  }
  .palette-item.active .palette-icon {
    background: var(--accent-subtle);
    color: var(--accent);
  }

  .palette-text { flex: 1; min-width: 0; }
  .palette-title {
    font-size: 14px;
    color: var(--text);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .palette-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    line-height: 1.2;
  }

  .palette-shortcut {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .palette-empty {
    padding: var(--s-5) var(--s-4);
    color: var(--text-muted);
    text-align: center;
    font-size: 14px;
  }

  .palette-footer {
    border-top: 1px solid var(--border);
    padding: 8px var(--s-4);
    display: flex;
    gap: var(--s-4);
    color: var(--text-faint);
    font-size: 11px;
    background: var(--surface-1);
  }
  .palette-footer kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--surface-0);
    color: var(--text-muted);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border);
    margin-right: 4px;
  }

  /* highlight matched substring */
  mark {
    background: var(--accent-subtle);
    color: var(--accent);
    padding: 0 1px;
    border-radius: 2px;
  }

  .recent-go {
    margin-top: var(--s-5);
    padding: var(--s-3) var(--s-4);
    background: var(--surface-0);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    min-height: 44px;
  }
  .recent-go strong { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<span class="demo-banner">demo</span>

<div class="page-shell">
  <h1>Command palette</h1>
  <p class="lede">Cmd / Ctrl + K from anywhere on the site to jump to any page, post, gallery, or tag. Search by typing. Arrow keys to navigate, Enter to go, Esc to close.</p>

  <button class="open-trigger" id="openTrigger">
    Search the site… <kbd>⌘ K</kbd>
  </button>

  <div class="recent-go" id="recentGo">Pick something — your last selection appears here.</div>
</div>

<!-- ============= Palette ============= -->
<div class="palette-backdrop" id="backdrop" role="dialog" aria-label="Site command palette" aria-modal="true">
  <div class="palette" id="palette">

    <div class="palette-input-row">
      <span class="glyph" aria-hidden="true">⌕</span>
      <input class="palette-input" id="paletteInput"
             placeholder="Jump to a page, post, gallery, or tag…"
             autocomplete="off" spellcheck="false" type="text">
      <span class="esc-hint">Esc</span>
    </div>

    <ul class="palette-list" id="paletteList" role="listbox"></ul>

    <div class="palette-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span><kbd>esc</kbd> close</span>
    </div>
  </div>
</div>

<script>
(() => {
  /* Demo dataset — real entries pulled from the site so behavior feels true. */
  const ITEMS = [
    // Top-level pages
    { kind: 'page',    icon: '⌂', title: 'Home',          meta: '/',            url: '/' },
    { kind: 'page',    icon: '☰', title: 'About',         meta: '/about/',      url: '/about/' },
    { kind: 'page',    icon: '⊞', title: 'Gallery',       meta: '/gallery/',    url: '/gallery/' },
    { kind: 'page',    icon: '✎', title: 'Posts',         meta: '/posts/',      url: '/posts/' },
    { kind: 'page',    icon: '☷', title: 'Resume',        meta: '/resume/',     url: '/resume/' },
    { kind: 'page',    icon: '✦', title: 'Portfolio',     meta: '/portfolio/',  url: '/portfolio/' },
    { kind: 'page',    icon: '↓', title: 'Resume.pdf',    meta: 'Download',     url: '/Resume.pdf' },
    { kind: 'page',    icon: '↓', title: 'Portfolio.pdf', meta: 'Download',     url: '/Portfolio.pdf' },

    // Posts
    { kind: 'post',    icon: '✎', title: 'How to Build a Website',                       meta: '2021 · 12 min',            url: '/posts/how-to-build-a-website-a-guide-for-command-line-novices/' },
    { kind: 'post',    icon: '✎', title: 'The Mostly Maine Trip Video',                  meta: '2020 · 1 min',             url: '/posts/the-mostly-maine-trip-video/' },
    { kind: 'post',    icon: '✎', title: 'The Book of Bitcoin',                          meta: '2020 · 5 min',             url: '/posts/the-book-of-bitcoin-an-analogy-to-explain-bitcoin/' },
    { kind: 'post',    icon: '✎', title: 'EOLRC – Build Guide',                          meta: '2020 · 4 min',             url: '/posts/eolrc-build-guide/' },
    { kind: 'post',    icon: '✎', title: 'EOLRC – LEGO RC from Plane Parts',             meta: '2020 · 2 min',             url: '/posts/eolrc-an-extremely-overkill-lego-rc-car-from-plane-parts/' },
    { kind: 'post',    icon: '✎', title: 'Let’s Kill This MacBook',                  meta: '2020 · 3 min',             url: '/posts/lets-kill-this-macbook-how-to-mine-monero-on-a-mac/' },

    // Galleries
    { kind: 'gallery', icon: '⊞', title: 'Adirondacks',         meta: 'gallery',  url: '/gallery/adirondacks/' },
    { kind: 'gallery', icon: '⊞', title: 'Garden',              meta: 'gallery',  url: '/gallery/garden/' },
    { kind: 'gallery', icon: '⊞', title: 'Ice Storm',           meta: 'gallery',  url: '/gallery/ice-storm/' },
    { kind: 'gallery', icon: '⊞', title: 'Light Drawings',      meta: 'gallery',  url: '/gallery/light-drawings/' },
    { kind: 'gallery', icon: '⊞', title: 'Maine Trip',          meta: 'gallery · 38 photos',  url: '/gallery/maine-trip/' },
    { kind: 'gallery', icon: '⊞', title: 'RC Planes',           meta: 'gallery',  url: '/gallery/rcplanes/' },
    { kind: 'gallery', icon: '⊞', title: 'Snow',                meta: 'gallery',  url: '/gallery/snow/' },
    { kind: 'gallery', icon: '⊞', title: 'Stone Valley',        meta: 'gallery',  url: '/gallery/stonevalley/' },
    { kind: 'gallery', icon: '⊞', title: 'Vacuum Tubes',        meta: 'gallery',  url: '/gallery/vaccumtubes/' },
    { kind: 'gallery', icon: '⊞', title: 'Waterlilies & Dragonflies', meta: 'gallery', url: '/gallery/waterlilies-dragonflies/' },

    // Tags
    { kind: 'tag', icon: '#', title: 'RC',           meta: 'tag · 4 posts', url: '/tags/rc/' },
    { kind: 'tag', icon: '#', title: 'flitetest',    meta: 'tag · 2 posts', url: '/tags/flitetest/' },
    { kind: 'tag', icon: '#', title: 'cryptocurrency', meta: 'tag · 3 posts', url: '/tags/cryptocurrency/' },
    { kind: 'tag', icon: '#', title: 'EOLRC',        meta: 'tag · 2 posts', url: '/tags/eolrc/' },
    { kind: 'tag', icon: '#', title: 'website',      meta: 'tag · 1 post',  url: '/tags/website/' },

    // Quick actions
    { kind: 'action', icon: '◐', title: 'Toggle theme', meta: 'light → dark → parchment', url: '#theme' },
    { kind: 'action', icon: '⤓', title: 'Download Resume.pdf', meta: 'PDF', url: '/Resume.pdf' },
    { kind: 'action', icon: '@', title: 'Email Nikolai',     meta: 'nan34@cornell.edu', url: 'mailto:nan34@cornell.edu' },
  ];

  const KIND_LABEL = {
    page:    'Pages',
    post:    'Posts',
    gallery: 'Galleries',
    tag:     'Tags',
    action:  'Actions',
  };
  const KIND_ORDER = ['action', 'page', 'post', 'gallery', 'tag'];

  /* ---------- elements ---------- */
  const trigger    = document.getElementById('openTrigger');
  const backdrop   = document.getElementById('backdrop');
  const palette    = document.getElementById('palette');
  const input      = document.getElementById('paletteInput');
  const listEl     = document.getElementById('paletteList');
  const recent     = document.getElementById('recentGo');

  let active = 0;
  let filtered = [];

  /* ---------- fuzzy match: subsequence match + simple scoring ---------- */
  function score(item, q) {
    if (!q) return 1;
    const t = item.title.toLowerCase();
    const qq = q.toLowerCase();
    if (t === qq) return 1000;
    if (t.startsWith(qq)) return 500 - (t.length - qq.length);
    if (t.includes(qq))   return 200 - t.indexOf(qq);

    // Subsequence match
    let i = 0, j = 0, hits = 0, gap = 0, last = -1;
    while (i < t.length && j < qq.length) {
      if (t[i] === qq[j]) {
        if (last >= 0) gap += i - last - 1;
        last = i;
        hits++;
        j++;
      }
      i++;
    }
    if (j < qq.length) return -1;
    return 100 - gap * 2 - (t.length - qq.length);
  }

  function highlight(text, q) {
    if (!q) return escapeHtml(text);
    const lo = text.toLowerCase();
    const qq = q.toLowerCase();
    const exact = lo.indexOf(qq);
    if (exact >= 0) {
      return escapeHtml(text.slice(0, exact))
        + '<mark>' + escapeHtml(text.slice(exact, exact + qq.length)) + '</mark>'
        + escapeHtml(text.slice(exact + qq.length));
    }
    // subsequence highlight
    let out = '';
    let qi = 0;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (qi < qq.length && lo[i] === qq[qi]) {
        out += '<mark>' + escapeHtml(ch) + '</mark>';
        qi++;
      } else {
        out += escapeHtml(ch);
      }
    }
    return out;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  /* ---------- rendering ---------- */
  function render() {
    const q = input.value.trim();
    filtered = ITEMS
      .map(it => ({ it, s: score(it, q) }))
      .filter(x => x.s >= 0)
      .sort((a, b) => b.s - a.s)
      .map(x => x.it);

    if (!q) {
      // group by kind for the empty state
      const groups = KIND_ORDER
        .map(k => ({ k, items: filtered.filter(it => it.kind === k) }))
        .filter(g => g.items.length);

      let flatIndex = 0;
      const html = groups.map(g => `
        <li class="palette-group-label">${KIND_LABEL[g.k]}</li>
        ${g.items.map(it => {
          const i = flatIndex++;
          return renderItem(it, i, q);
        }).join('')}
      `).join('');
      listEl.innerHTML = html || '<li class="palette-empty">No matches.</li>';
      // re-flatten for keyboard nav
      filtered = groups.flatMap(g => g.items);
    } else {
      const html = filtered.map((it, i) => renderItem(it, i, q)).join('');
      listEl.innerHTML = html || '<li class="palette-empty">No matches for “' + escapeHtml(q) + '”.</li>';
    }

    if (active >= filtered.length) active = Math.max(0, filtered.length - 1);
    updateActive();
  }

  function renderItem(it, i, q) {
    return `
      <li class="palette-item" data-i="${i}" role="option">
        <span class="palette-icon" aria-hidden="true">${it.icon}</span>
        <span class="palette-text">
          <span class="palette-title">${highlight(it.title, q)}</span>
          <span class="palette-meta">${escapeHtml(it.meta)}</span>
        </span>
        <span class="palette-shortcut">${KIND_LABEL[it.kind].toLowerCase().slice(0, -1)}</span>
      </li>
    `;
  }

  function updateActive() {
    listEl.querySelectorAll('.palette-item').forEach(el => {
      const i = +el.dataset.i;
      el.classList.toggle('active', i === active);
      if (i === active) {
        el.scrollIntoView({ block: 'nearest' });
      }
    });
  }

  /* ---------- open / close ---------- */
  function open() {
    backdrop.dataset.open = 'true';
    input.value = '';
    active = 0;
    render();
    setTimeout(() => input.focus(), 0);
    document.body.style.overflow = 'hidden';
  }
  function close() {
    backdrop.dataset.open = 'false';
    document.body.style.overflow = '';
  }

  /* ---------- selection ---------- */
  function go(it) {
    if (!it) return;
    recent.innerHTML = `Last picked → <strong>${escapeHtml(it.title)}</strong> <span style="color: var(--text-faint);">(${escapeHtml(it.url)})</span>`;
    close();
  }

  /* ---------- events ---------- */
  trigger.addEventListener('click', open);

  document.addEventListener('keydown', e => {
    const isOpen = backdrop.dataset.open === 'true';

    // Global open shortcut
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      isOpen ? close() : open();
      return;
    }

    if (!isOpen) return;

    if (e.key === 'Escape') { e.preventDefault(); close(); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      active = Math.min(filtered.length - 1, active + 1);
      updateActive();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      active = Math.max(0, active - 1);
      updateActive();
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      go(filtered[active]);
      return;
    }
  });

  input.addEventListener('input', () => { active = 0; render(); });

  listEl.addEventListener('click', e => {
    const item = e.target.closest('.palette-item');
    if (!item) return;
    go(filtered[+item.dataset.i]);
  });

  listEl.addEventListener('mousemove', e => {
    const item = e.target.closest('.palette-item');
    if (!item) return;
    const i = +item.dataset.i;
    if (i !== active) { active = i; updateActive(); }
  });

  backdrop.addEventListener('click', e => {
    if (e.target === backdrop) close();
  });
})();
</script>
</body>
</html>
