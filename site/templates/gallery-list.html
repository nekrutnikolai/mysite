<!doctype html>
<html lang="en">
<head>
{{> head }}
</head>
<body>
<div id="nav-reading-progress" class="nav-reading-progress" aria-hidden="true"></div>
{{> header }}
<main class="content{{#wide}} wide{{/wide}}">
{{> breadcrumbs }}
<article class="gallery-index">
  <header><h1>Gallery</h1><p class="lede">Photographs from adventures and everyday scenes.</p></header>
  <nav class="gallery-filter" data-gallery-filter aria-label="Filter galleries by year">
    <button type="button" class="gallery-filter-chip" data-year="" aria-pressed="true">All</button>
    {{#years}}<button type="button" class="gallery-filter-chip" data-year="{{ year }}" aria-pressed="false">{{ year }}</button>{{/years}}
  </nav>
  <ul class="gallery-grid" role="list">
    {{#galleries}}
      <li class="gallery-tile" data-gallery-year="{{ year }}">
        <a href="{{ url }}">
          <img class="gallery-tile-img"
               src="{{ coverThumbUrl }}"
               srcset="{{ coverThumbUrl }} {{ coverThumbW }}w, {{ coverPreviewUrl }} 1500w"
               sizes="(max-width: 640px) 100vw, 33vw"
               width="{{ coverThumbW }}"
               height="{{ coverThumbH }}"
               alt="{{ title }}"
               loading="lazy">
          <div class="gallery-tile-body">
            <span class="gallery-tile-title">{{ title }}</span>
            <span class="gallery-tile-meta">{{ imageCount }} photo{{#imagesPlural}}s{{/imagesPlural}} &middot; <time datetime="{{ dateISO }}">{{ dateHuman }}</time></span>
          </div>
        </a>
      </li>
    {{/galleries}}
  </ul>
</article>
{{> adjacent-sections }}
<button id="nav-back-to-top" class="nav-back-to-top" type="button" aria-label="Back to top" hidden>↑</button>
</main>
{{> footer }}
<script src="/assets/js/theme.js" defer></script>
<script src="/assets/js/nav-scroll.js" defer></script>
<script src="/assets/js/nav-toc.js" defer></script>
<script src="/assets/js/nav-gallery-filter.js" defer></script>
<script src="/assets/js/nav-swipe.js" defer></script>
<script src="/assets/js/nav-cmdk.js" defer></script>
</body>
</html>
