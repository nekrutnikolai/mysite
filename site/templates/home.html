<!doctype html>
<html lang="en">
<head>
{{> head }}
</head>
<body>
{{> header }}
<main class="content">
<section class="home-hero">
  <p class="home-kicker">{{ kicker }}</p>
  <h1 class="home-title">{{ title }}</h1>
  <p class="home-lede">{{{ lede }}}</p>
  <nav class="home-actions">
    {{#actions}}<a class="btn {{ class }}" href="{{ href }}"{{#external}} target="_blank" rel="noopener"{{/external}}>{{ label }}</a>{{/actions}}
  </nav>
</section>

<figure class="home-portrait">
  <img src="/img/nikolai_pipe_hires.png" alt="Nikolai standing inside a large concrete pipe" width="1000" height="1000" loading="lazy">
</figure>
</main>
{{> footer }}
{{> scripts }}
</body>
</html>
