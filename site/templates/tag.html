<!doctype html>
<html lang="en">
<head>
{{> head }}
</head>
<body>
{{> header }}
<main class="content">
<h1>Tagged: {{ name }}</h1>
<p class="tag-meta">{{ count }} post{{#plural}}s{{/plural}}</p>
<ul class="post-list">
{{#posts}}<li class="post-list-item"><a href="{{ url }}"><span class="post-list-title">{{ title }}</span> <time class="post-list-date" datetime="{{ dateISO }}">{{ dateHuman }}</time></a></li>
{{/posts}}</ul>
<p class="post-nav"><a href="/tags/">← All tags</a></p>
</main>
{{> footer }}
<script src="/assets/js/theme.js" defer></script>
<script src="/assets/js/nav-scroll.js" defer></script>
<script src="/assets/js/nav-toc.js" defer></script>
<script src="/assets/js/nav-gallery-filter.js" defer></script>
<script src="/assets/js/nav-swipe.js" defer></script>
<script src="/assets/js/nav-cmdk.js" defer></script>
</body>
</html>
