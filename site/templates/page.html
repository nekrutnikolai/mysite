<!doctype html>
<html lang="en">
<head>
{{> head }}
</head>
<body>
<div id="nav-reading-progress" class="nav-reading-progress" aria-hidden="true"></div>
{{> header }}
<main class="content">
{{> breadcrumbs }}
{{#hasToc}}{{> toc }}{{/hasToc}}
<article class="page">
  {{#showTitle}}<header class="page-header"><h1>{{ title }}</h1></header>{{/showTitle}}
  {{{ body }}}
</article>
{{> adjacent-sections }}
<button id="nav-back-to-top" class="nav-back-to-top" type="button" aria-label="Back to top" hidden>↑</button>
</main>
{{> footer }}
{{> scripts }}
</body>
</html>
