<header class="site-header">
  <a class="site-logo" href="/">n<sup>n</sup></a>
  <span class="site-section-indicator" data-section-indicator aria-hidden="true"></span>

  <button id="nav-toggle" type="button" class="site-nav-toggle" aria-label="Menu" aria-controls="site-nav" aria-expanded="false">
    <span class="site-nav-toggle-bars" aria-hidden="true"></span>
  </button>

  <nav id="site-nav" class="site-nav">
    {{#nav}}<a href="{{ href }}"{{#external}} target="_blank" rel="noopener"{{/external}}{{#active}} aria-current="page"{{/active}}>{{ label }}</a>{{/nav}}
  </nav>

  <button id="theme-toggle" type="button" class="theme-switch" aria-label="Toggle theme">
    <span class="theme-switch-icon" data-theme-icon="light" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </span>
    <span class="theme-switch-icon" data-theme-icon="dark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </span>
    <span class="theme-switch-icon" data-theme-icon="parchment" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </span>
  </button>
</header>
