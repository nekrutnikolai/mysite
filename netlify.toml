# Netlify build configuration for the post-migration site.
# Active build is the Node pipeline in site/build.mjs — Hugo is no longer run.

[build]
  publish = "dist"
  # Pull clean masters from R2 (the clean/gallery/ prefix) before building.
  # Source masters are no longer in git; download-originals materializes them
  # into content/gallery/<album>/images/ so sharp can regenerate thumbs and
  # mediums. R2_ACCOUNT_ID + R2_ACCESS_KEY_ID + R2_SECRET_ACCESS_KEY must be
  # set as secrets in the Netlify UI (Site settings → Environment variables).
  command = "npm ci && npm run download-originals && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  # Canonical site URL used for OG meta + sitemap + RSS absolute URLs.
  # Override in the Netlify UI if you change domains.
  SITE_URL = "https://nekrutnikolai.com"
  # Cloudflare R2 public bucket URL for gallery originals. When set,
  # site/lib/images.mjs emits R2 URLs in data-full and skips the heavy
  # original-encode pass during build (cold build ~22s vs ~76s otherwise).
  # Originals must be re-uploaded locally after content/watermark changes:
  # `npm run upload-originals` (which sets BUILD_ORIGINALS=1).
  R2_PUBLIC_BASE = "https://pub-c55decec528646838e890d87bc0b4e3e.r2.dev"

# Production-only env vars. Cloudflare Web Analytics token lives here (not
# in the shared [build.environment]) so deploy previews + branch deploys
# stay invisible to the analytics dashboard. The token is non-secret —
# it's emitted in every page's <head> as part of the public beacon script.
[context.production.environment]
  CF_ANALYTICS_TOKEN = "202be32286a244bb811075dd2dd7fc7f"

# Deploy previews (per-PR) and branch deploys inherit the build above, but
# point SITE_URL at the per-deploy prime URL so OG/canonical match what a
# reviewer actually visits. build.mjs already falls through to DEPLOY_PRIME_URL
# when SITE_URL is unset; we unset it here so the fallback fires.
[context.deploy-preview.environment]
  SITE_URL = ""

[context.branch-deploy.environment]
  SITE_URL = ""

# Persist sharp's gallery image outputs and the manifest cache between
# deploys. Cold builds re-encoding ~250 24 MP JPEGs into thumbs + previews
# add ~30 s every push; with the cache, only changed/new images do the
# expensive sharp work. build.mjs's clearDist() preserves the gallery
# img/originals subdirs so the cache is honored.
[[plugins]]
  package = "netlify-plugin-cache"
  [plugins.inputs]
    paths = [
      "site/cache",
      "dist/gallery"
    ]

# Serve dist/404.html automatically on missing routes.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
