# Netlify build configuration for the post-migration site.
# Active build is the Node pipeline in site/build.mjs — Hugo is no longer run.

[build]
  publish = "dist"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
  # Canonical site URL used for OG meta + sitemap + RSS absolute URLs.
  # Override in the Netlify UI if you change domains.
  SITE_URL = "https://nnekrut.netlify.app"
  # Cloudflare R2 public bucket URL for gallery originals. When set,
  # site/lib/images.mjs emits R2 URLs in data-full and skips the heavy
  # original-encode pass during build (cold build ~22s vs ~76s otherwise).
  # Originals must be re-uploaded locally after content/watermark changes:
  # `npm run upload-originals` (which sets BUILD_ORIGINALS=1).
  R2_PUBLIC_BASE = "https://pub-c55decec528646838e890d87bc0b4e3e.r2.dev"

# Deploy previews (per-PR) and branch deploys inherit the build above, but
# point SITE_URL at the per-deploy prime URL so OG/canonical match what a
# reviewer actually visits. build.mjs already falls through to DEPLOY_PRIME_URL
# when SITE_URL is unset; we unset it here so the fallback fires.
[context.deploy-preview.environment]
  SITE_URL = ""

[context.branch-deploy.environment]
  SITE_URL = ""

# Serve dist/404.html automatically on missing routes.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
